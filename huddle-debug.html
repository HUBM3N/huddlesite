<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huddle — Debug</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0f0f;
    color: #e0e0e0;
    font-family: 'Inter', sans-serif;
    padding: 28px 20px 60px;
  }

  header {
    max-width: 1200px;
    margin: 0 auto 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    color: #fff;
  }

  h1 span {
    font-size: 0.85rem;
    font-weight: 400;
    color: #555;
    margin-left: 10px;
  }

  .summary {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .badge {
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 0.78rem;
    font-weight: 600;
    border: 1px solid;
  }

  .badge-total   { background: #1a1a1a; border-color: #333; color: #aaa; }
  .badge-ok      { background: #141f13; border-color: #2d5c28; color: #7acc6e; }
  .badge-fail    { background: #1f1313; border-color: #5c2828; color: #cc6e6e; }
  .badge-loading { background: #1a1a18; border-color: #4a4a28; color: #cccc6e; }

  .controls {
    max-width: 1200px;
    margin: 0 auto 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 7px 16px;
    border-radius: 8px;
    border: 1px solid #2e2e2e;
    background: #1a1a1a;
    color: #888;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: #444; color: #ccc; }
  .filter-btn.active { background: #272727; border-color: #555; color: #fff; }

  .reload-btn {
    padding: 7px 16px;
    border-radius: 8px;
    border: 1px solid #2e2e2e;
    background: #1a1a1a;
    color: #888;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    margin-left: auto;
  }
  .reload-btn:hover { border-color: #555; color: #fff; }

  .grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  .card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .card.ok      { border-color: #2d5c28; }
  .card.fail    { border-color: #5c2828; }
  .card.loading { border-color: #4a4a28; }

  .card-img-wrap {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    background: #111;
  }

  .card-img-wrap img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .card-status-pill {
    position: absolute;
    top: 8px; right: 8px;
    padding: 3px 9px;
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .pill-ok      { background: rgba(20,31,19,0.92); color: #7acc6e; border: 1px solid #2d5c28; }
  .pill-fail    { background: rgba(31,19,19,0.92); color: #cc6e6e; border: 1px solid #5c2828; }
  .pill-loading { background: rgba(26,26,20,0.92); color: #cccc6e; border: 1px solid #4a4a28; }

  .card-img-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    color: #cc6e6e;
    padding: 12px;
    text-align: center;
    line-height: 1.5;
  }

  .card-body {
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .card-name {
    font-size: 0.95rem;
    font-weight: 700;
    color: #e0e0e0;
  }

  .card-author {
    font-size: 0.75rem;
    color: #555;
  }

  .card-url {
    font-size: 0.68rem;
    color: #444;
    word-break: break-all;
    line-height: 1.4;
    font-family: monospace;
  }

  .card-url.bad { color: #cc6e6e; }

  .card-actions {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }

  .card-link {
    flex: 1;
    padding: 6px 10px;
    border-radius: 7px;
    border: 1px solid #2e2e2e;
    background: #141414;
    color: #888;
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    transition: all 0.12s;
    display: block;
  }
  .card-link:hover { border-color: #444; color: #ccc; }

  .card-index {
    position: absolute;
    top: 8px; left: 8px;
    background: rgba(0,0,0,0.7);
    color: #888;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 5px;
    font-family: monospace;
  }

  .no-results {
    max-width: 960px;
    margin: 40px auto;
    text-align: center;
    color: #444;
    font-size: 0.9rem;
  }

  /* autocomplete test */
  .ac-test {
    max-width: 960px;
    margin: 0 auto 28px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 16px;
  }

  .ac-test h2 {
    font-size: 0.8rem;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }

  .ac-test-row {
    display: flex;
    gap: 8px;
  }

  .ac-input {
    flex: 1;
    background: #111;
    border: 1px solid #2e2e2e;
    border-radius: 8px;
    color: #e0e0e0;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    padding: 9px 14px;
    outline: none;
  }
  .ac-input:focus { border-color: #444; }
  .ac-input::placeholder { color: #333; }

  .ac-results {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 28px;
  }

  .ac-match {
    padding: 4px 12px;
    border-radius: 6px;
    background: #141414;
    border: 1px solid #2e2e2e;
    font-size: 0.8rem;
    color: #aaa;
  }

  .ac-match mark { background: none; color: #fff; font-weight: 700; }

  .ac-none { color: #444; font-size: 0.8rem; align-self: center; }
</style>
</head>
<body>

<header>
  <h1>huddle debug <span id="header-sub">loading...</span></h1>
  <div class="summary">
    <div class="badge badge-total">Total: <span id="count-total">—</span></div>
    <div class="badge badge-ok">✓ OK: <span id="count-ok">0</span></div>
    <div class="badge badge-fail">✗ Failed: <span id="count-fail">0</span></div>
    <div class="badge badge-loading">⏳ Loading: <span id="count-loading">0</span></div>
  </div>
</header>

<!-- AUTOCOMPLETE TEST -->
<div class="ac-test">
  <h2>Autocomplete test (with dash/space ignore)</h2>
  <div class="ac-test-row">
    <input class="ac-input" id="ac-input" placeholder="Type a HUD name to test matching..." autocomplete="off" />
  </div>
  <div class="ac-results" id="ac-results"><span class="ac-none">Start typing to test...</span></div>
</div>

<!-- FILTER CONTROLS -->
<div class="controls">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="ok">✓ OK</button>
  <button class="filter-btn" data-filter="fail">✗ Failed</button>
  <button class="filter-btn" data-filter="loading">⏳ Loading</button>
  <button class="reload-btn" id="reload-btn">↻ Retry failed</button>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>
<div class="no-results" id="no-results" style="display:none">No HUDs match this filter.</div>

// ============================================================
// STATE
// ============================================================
const statuses = {}; // index -> 'loading' | 'ok' | 'fail'
let activeFilter = 'all';

HUDS.forEach((_, i) => { statuses[i] = 'loading'; });

// ============================================================
// BUILD CARDS
// ============================================================
const grid = document.getElementById('grid');

function buildCards() {
  grid.innerHTML = '';
  const filtered = HUDS.map((h, i) => ({ ...h, i }))
  .filter(h => {
    if (activeFilter === 'all') return true;
    return statuses[h.i] === activeFilter;
  })
  .sort((a, b) => {
    const order = { fail: 0, loading: 1, ok: 2 };
    return (order[statuses[a.i]] ?? 1) - (order[statuses[b.i]] ?? 1);
  });

  document.getElementById('no-results').style.display = filtered.length === 0 ? 'block' : 'none';

  filtered.forEach(({ name, url, link, author, i }) => {
    const status = statuses[i];

    const card = document.createElement('div');
    card.className = `card ${status}`;
    card.id = `card-${i}`;

    card.innerHTML = `
      <div class="card-img-wrap">
        <div class="card-index">#${i}</div>
        ${status === 'fail'
          ? `<div class="card-img-placeholder">⚠️ Image failed to load<br><span style="color:#555;font-size:0.65rem">${escHtml(url)}</span></div>`
          : `<img src="${escHtml(url)}" data-index="${i}" />`
        }
        <div class="card-status-pill pill-${status}">
          ${status === 'ok' ? '✓ OK' : status === 'fail' ? '✗ FAIL' : '⏳ ...'}
        </div>
      </div>
      <div class="card-body">
        <div class="card-name">${escHtml(name)}</div>
        <div class="card-author">by ${escHtml(author)}</div>
        <div class="card-url ${status === 'fail' ? 'bad' : ''}">${escHtml(url)}</div>
        <div class="card-actions">
          <a class="card-link" href="${escHtml(link)}" target="_blank">🔗 HUD page</a>
          <a class="card-link" href="${escHtml(url)}" target="_blank">🖼 Image</a>
        </div>
      </div>
    `;

    // Attach load/error listeners to newly created img
    const img = card.querySelector('img[data-index]');
    if (img) {
      img.addEventListener('load',  () => setStatus(i, 'ok'));
      img.addEventListener('error', () => setStatus(i, 'fail'));
    }

    grid.appendChild(card);
  });
}

// ============================================================
// STATUS MANAGEMENT
// ============================================================
function setStatus(i, status) {
  statuses[i] = status;
  updateCard(i);
  updateSummary();
}

function updateCard(i) {
  const card = document.getElementById(`card-${i}`);
  if (!card) return; // card may be filtered out

  const { name, url, link, author } = HUDS[i];
  const status = statuses[i];

  card.className = `card ${status}`;
  card.innerHTML = `
    <div class="card-img-wrap">
      <div class="card-index">#${i}</div>
      ${status === 'fail'
        ? `<div class="card-img-placeholder">⚠️ Image failed to load<br><span style="color:#555;font-size:0.65rem">${escHtml(url)}</span></div>`
        : `<img src="${escHtml(url)}" data-index="${i}" />`
      }
      <div class="card-status-pill pill-${status}">
        ${status === 'ok' ? '✓ OK' : status === 'fail' ? '✗ FAIL' : '⏳ ...'}
      </div>
    </div>
    <div class="card-body">
      <div class="card-name">${escHtml(name)}</div>
      <div class="card-author">by ${escHtml(author)}</div>
      <div class="card-url ${status === 'fail' ? 'bad' : ''}">${escHtml(url)}</div>
      <div class="card-actions">
        <a class="card-link" href="${escHtml(link)}" target="_blank">🔗 HUD page</a>
        <a class="card-link" href="${escHtml(url)}" target="_blank">🖼 Image</a>
      </div>
    </div>
  `;

  const img = card.querySelector('img[data-index]');
  if (img) {
    img.addEventListener('load',  () => setStatus(i, 'ok'));
    img.addEventListener('error', () => setStatus(i, 'fail'));
  }
}

function updateSummary() {
  const total   = HUDS.length;
  const ok      = Object.values(statuses).filter(s => s === 'ok').length;
  const fail    = Object.values(statuses).filter(s => s === 'fail').length;
  const loading = Object.values(statuses).filter(s => s === 'loading').length;

  document.getElementById('count-total').textContent   = total;
  document.getElementById('count-ok').textContent      = ok;
  document.getElementById('count-fail').textContent    = fail;
  document.getElementById('count-loading').textContent = loading;

  const done = ok + fail;
  document.getElementById('header-sub').textContent =
    done === total ? `all ${total} checked` : `checking ${done}/${total}...`;
}

// ============================================================
// FILTER BUTTONS
// ============================================================
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    buildCards();
  });
});

// ============================================================
// RETRY FAILED
// ============================================================
document.getElementById('reload-btn').addEventListener('click', () => {
  HUDS.forEach((hud, i) => {
    if (statuses[i] === 'fail') {
      statuses[i] = 'loading';
      updateCard(i);
      // Force reload by busting cache
      const img = document.querySelector(`img[data-index="${i}"]`);
      if (img) {
        img.src = hud.url + '?retry=' + Date.now();
        img.addEventListener('load',  () => setStatus(i, 'ok'),  { once: true });
        img.addEventListener('error', () => setStatus(i, 'fail'), { once: true });
      }
    }
  });
  updateSummary();
});

// ============================================================
// AUTOCOMPLETE TEST
// ============================================================
const acInput   = document.getElementById('ac-input');
const acResults = document.getElementById('ac-results');

acInput.addEventListener('input', () => {
  const val = acInput.value.trim().toLowerCase().replace(/[-\s]/g, '');
  acResults.innerHTML = '';

  if (!val) {
    acResults.innerHTML = '<span class="ac-none">Start typing to test...</span>';
    return;
  }

  const matches = HUDS.filter(h => h.name.toLowerCase().replace(/[-\s]/g, '').includes(val));

  if (matches.length === 0) {
    acResults.innerHTML = '<span class="ac-none">No matches</span>';
    return;
  }

  matches.forEach(h => {
    const el = document.createElement('div');
    el.className = 'ac-match';
    // Highlight the matching part in original name
    const lo = h.name.toLowerCase().replace(/[-\s]/g, '');
    const start = lo.indexOf(val);
    if (start >= 0) {
      // Map back to original string (best effort)
      el.innerHTML = escHtml(h.name);
    } else {
      el.textContent = h.name;
    }
    acResults.appendChild(el);
  });
});

// ============================================================
// UTILS
// ============================================================
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// INIT
// ============================================================
updateSummary();
buildCards();

// Kick off image loads via hidden img elements for cards not yet in DOM
// (images in cards already trigger their own events — this handles filtered-out ones)
HUDS.forEach((hud, i) => {
  if (activeFilter !== 'all') {
    const probe = new Image();
    probe.onload  = () => setStatus(i, 'ok');
    probe.onerror = () => setStatus(i, 'fail');
    probe.src = hud.url;
  }
});
</script>
</body>
</html>
